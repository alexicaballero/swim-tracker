services:

  # ── Base de datos principal ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: swim_postgres
    environment:
      POSTGRES_USER: swim
      POSTGRES_PASSWORD: swim_secret
      POSTGRES_DB: swimtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swim -d swimtracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swim_net

